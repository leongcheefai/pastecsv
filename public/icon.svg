<svg width="180" height="180" viewBox="0 0 180 180" fill="none" xmlns="http://www.w3.org/2000/svg">
  <style>
    @media (prefers-color-scheme: light) {
      .bg { fill: #18181b; }
      .cell { fill: white; }
      .header { fill: #a1a1aa; }
    }
    @media (prefers-color-scheme: dark) {
      .bg { fill: #fafafa; }
      .cell { fill: #18181b; }
      .header { fill: #52525b; }
    }
  </style>
  <rect class="bg" width="180" height="180" rx="37" />
  <!-- Header row -->
  <rect class="header" x="30" y="38" width="34" height="26" rx="4" />
  <rect class="header" x="73" y="38" width="34" height="26" rx="4" />
  <rect class="header" x="116" y="38" width="34" height="26" rx="4" />
  <!-- Row 1 -->
  <rect class="cell" x="30" y="74" width="34" height="26" rx="4" />
  <rect class="cell" x="73" y="74" width="34" height="26" rx="4" />
  <rect class="cell" x="116" y="74" width="34" height="26" rx="4" />
  <!-- Row 2 -->
  <rect class="cell" x="30" y="110" width="34" height="26" rx="4" />
  <rect class="cell" x="73" y="110" width="34" height="26" rx="4" />
  <rect class="cell" x="116" y="110" width="34" height="26" rx="4" />
</svg>
